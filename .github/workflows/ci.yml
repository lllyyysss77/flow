name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev build-essential

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install JS deps (FlowDeerTree)
        working-directory: FlowDeerTree
        run: |
          if command -v yarn >/dev/null 2>&1; then
            yarn install --frozen-lockfile || yarn install
          else
            npm install
          fi

      - name: Install JS deps (FlowDeerTreeElectron)
        working-directory: FlowDeerTreeElectron
        run: |
          if command -v yarn >/dev/null 2>&1; then
            yarn install --frozen-lockfile || yarn install
          else
            npm install
          fi

      - name: Build Rust backend
        working-directory: FlowDeerTree/src-tauri
        run: |
          cargo build --locked

      - name: Run Rust tests
        working-directory: FlowDeerTree/src-tauri
        run: |
          cargo test --locked -- --nocapture

      - name: Lint / smoke (optional)
        run: echo "CI finished"
